<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base do Agente - Ordem Paranormal</title>
    <style>
        /* Estilos Gerais e Tema de Sangue */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #080202;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Detalhes de fundo simulando a névoa/sangue */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(139, 0, 0, 0.15) 0%, rgba(0, 0, 0, 0.9) 80%);
            z-index: 1;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background: rgba(15, 5, 5, 0.95);
            border: 2px solid #8b0000;
            border-radius: 8px;
            padding: 40px 30px;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.4);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        /* Cabeçalho */
        .logo-area h1 {
            font-size: 2.2rem;
            color: #ff1a1a;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 26, 26, 0.6);
        }

        .logo-area p {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
        }

        .elemento-simbolo {
            color: #ff1a1a;
            font-size: 2.5rem;
            margin-bottom: 20px;
            animation: pulsar 3s infinite alternate;
        }

        /* Formulário */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #ff9999;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: #1a0808;
            border: 1px solid #4a1414;
            border-radius: 4px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #ff1a1a;
            box-shadow: 0 0 10px rgba(255, 26, 26, 0.3);
            background: #260c0c;
        }

        /* Botão */
        .btn-enviar {
            width: 100%;
            padding: 14px;
            background: #8b0000;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.4);
        }

        .btn-enviar:hover {
            background: #ff1a1a;
            box-shadow: 0 0 20px rgba(255, 26, 26, 0.6);
            transform: translateY(-2px);
        }

        /* Link Alternativo */
        .footer-link {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #aaa;
        }

        .footer-link a {
            color: #ff1a1a;
            text-decoration: none;
            font-weight: bold;
            transition: color 0.2s;
        }

        .footer-link a:hover {
            text-decoration: underline;
            color: #ff6666;
        }

        /* Animação de Pulsar (Sentimento de Sangue/Coração) */
        @keyframes pulsar {
            0% {
                transform: scale(1);
                text-shadow: 0 0 10px rgba(255, 26, 26, 0.5);
            }
            100% {
                transform: scale(1.08);
                text-shadow: 0 0 25px rgba(255, 26, 26, 0.9);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="logo-area">
                <div class="elemento-simbolo">🩸</div>
                <h1>Base do Agente</h1>
                <p>Recrutamento da Ordem</p>
            </div>

            <form id="cadastroForm">
                <div class="form-group">
                    <label for="nome">Nome do Agente (ou Nick)</label>
                    <input type="text" id="nome" placeholder="Ex: Veríssimo" required>
                </div>

                <div class="form-group">
                    <label for="email">E-mail de Contato</label>
                    <input type="email" id="email" placeholder="seu-email@ordem.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha de Acesso</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-enviar">Iniciar Transmissão</button>
            </form>

            <div class="footer-link">
                Já possui autorização? <a href="#">Acessar Terminal</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('cadastroForm').addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Captura os valores dos campos
            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            
            // Cria o objeto do agente com as informações
            const novoAgente = {
                nome: nome,
                email: email,
                senha: senha,
                dataCadastro: new Date().toLocaleDateString('pt-BR')
            };

            // Pega a lista de agentes já cadastrados ou cria uma nova se estiver vazia
            let listaAgentes = JSON.parse(localStorage.getItem('agentesOrdem')) || [];
            
            // Adiciona o novo agente na lista
            listaAgentes.push(novoAgente);
            
            // Salva a lista atualizada de volta no LocalStorage do navegador
            localStorage.setItem('agentesOrdem', JSON.stringify(listaAgentes));
            
            alert(`Agente ${nome} devidamente registrado nos arquivos locais da Base!`);
            
            // Limpa o formulário para o próximo input
            document.getElementById('cadastroForm').reset();
        });
    </script>

</body>
</html>
